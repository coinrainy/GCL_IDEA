meta:
  method: IRIS-GCL
  status_default: smoke
  split_type: stratified_random_1_1_8
  evaluator: logreg_val
  note: >
    Minimal Cora seed=0 relation-diagnostic smoke for IRIS-GCL. This runner
    freezes a GRACE encoder, constructs planned positive-relation variants,
    applies relation smoothing for diagnostic evaluation, and records mining
    diagnostics. It is not a formal multi-seed result.

dataset:
  name: Cora
  seed: 0

pretrain:
  Cora:
    num_epochs: 200

iris:
  positive_budget: 10
  relation_smoothing_weight: 1.0
  candidate_pool_size: 128
  anti_proximity:
    embedding_near_quantile: 0.8
    graph_near_quantile: 0.8
  residualization:
    max_fit_pairs: 250000
    soft_proximity_penalty: 0.15
    hybrid_cast_weight: 0.35
    certification_weight: 0.3
  certified_closure:
    candidate_pool_size: 128
    positive_quantile: 0.75
    neutral_quantile: 0.45
    min_positive_per_anchor: 1
  diffusion:
    alpha: 0.2
    steps: 3
  response:
    feature_mask_rate: 0.3
    edge_drop_rate: 0.3
    high_frequency_scale: 0.5
    local_smoothness_weight: 1.0
    ego_consistency_weight: 1.0
  diagnostics:
    partial_corr_max_pairs: 250000
    gmm_sample_pairs: 200000
    tau_for_repulsion_mass: 0.4

variants:
  - id: I0
    name: GRACE
    family: grace_base
  - id: I1
    name: knn_multi_positive
    family: embedding_knn
  - id: I2
    name: ppr_diffusion_positive
    family: graph_diffusion
  - id: I3
    name: pmgcl_lite_bmm
    family: probabilistic_mining
    implementation_note: "GMM-on-similarity proxy for the smoke-stage BMM-style probabilistic miner."
  - id: I4
    name: cast_one_step_proxy
    family: cast_proxy
    implementation_note: "One-step CAST-style proxy using feature, embedding, and structural agreement; not a full CAST implementation."
  - id: I5
    name: iris_full
    family: iris_full
  - id: I6
    name: iris_response_shuffled
    family: iris_response_shuffled
  - id: I7
    name: iris_no_anti_proximity
    family: iris_no_anti_proximity
  - id: I8
    name: iris_structural_signature_only
    family: iris_structural_only
  - id: I9
    name: iris_no_gradient_proxy
    family: iris_no_gradient_proxy
    implementation_note: "Equivalent to the current minimal IRIS response because positive-gradient proxy was removed before smoke."
  - id: I10
    name: r2_iris_residualized_response
    family: residualized_response
    implementation_note: "R2-IRIS: selects by response residual after controlling feature, embedding, graph proximity, and degree gap."
  - id: I11
    name: raw_response_no_residual
    family: raw_response_no_residual
    implementation_note: "Raw response top-k without anti-proximity or residualization."
  - id: I12
    name: residual_response_soft_proximity_penalty
    family: residualized_soft_penalty
    implementation_note: "Residual response with a soft proximity penalty instead of hard anti-proximity filtering."
  - id: I13
    name: response_cast_hybrid
    family: response_cast_hybrid
    implementation_note: "Hybrid diagnostic: residual response plus CAST-style feature/embedding/structure score."
  - id: I14
    name: response_reranked_knn_pool
    family: response_reranked_knn_pool
    implementation_note: "Response residual reranks only a label-free embedding-kNN candidate pool."
  - id: I15
    name: response_reranked_cast_pool
    family: response_reranked_cast_pool
    implementation_note: "Response residual reranks only a label-free CAST-style candidate pool."
  - id: I16
    name: response_certified_knn_score
    family: response_certified_knn_score
    implementation_note: "Embedding-kNN score with residual response as a certificate term."
  - id: I17
    name: response_certified_cast_score
    family: response_certified_cast_score
    implementation_note: "CAST-style score with residual response as a certificate term."
  - id: I18
    name: response_certified_cast_w015
    family: response_certified_cast_w015
    implementation_note: "CAST-style score with a lighter 0.15 residual-response certificate."
  - id: I19
    name: response_certified_cast_w045
    family: response_certified_cast_w045
    implementation_note: "CAST-style score with a stronger 0.45 residual-response certificate."
  - id: I20
    name: response_certified_knn_w015
    family: response_certified_knn_w015
    implementation_note: "Embedding-kNN score with a lighter 0.15 residual-response certificate."
  - id: I21
    name: response_certified_knn_w045
    family: response_certified_knn_w045
    implementation_note: "Embedding-kNN score with a stronger 0.45 residual-response certificate."
  - id: I22
    name: certified_cast_closure
    family: certified_cast_closure
    implementation_note: "Three-way closure: CAST candidates with high residual response become positives, uncertain certified candidates become neutral/excluded."
