      weight_decay: 0.00001
      loss_batch_size: 4096
  - name: computers_tau02_1000
    dataset: Computers
    source: controlled_search_epoch_after_tau
    hypothesis: "Best first-round direction was tau=0.2; test if longer pretraining closes the gap."
    overrides:
      learning_rate: 0.001
      num_hidden: 256
      num_proj_hidden: 256
      activation: prelu
      num_layers: 2
      drop_edge_rate_1: 0.2
      drop_edge_rate_2: 0.4
      drop_feature_rate_1: 0.1
      drop_feature_rate_2: 0.0
      tau: 0.2
      num_epochs: 1000
      weight_decay: 0.00001
      loss_batch_size: 4096
  - name: computers_tau02_lr0005_500
    dataset: Computers
